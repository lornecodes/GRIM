name: staging-organize
version: "1.0"
description: >
  Protocol for organizing accepted staging artifacts into the correct
  project locations. After audit passes, files need to be moved from
  the staging area to their proper places in the workspace.

entry_point: protocol.md
type: instruction-protocol

permissions:
  - staging:read
  - staging:write
  - filesystem:write
  - vault:read

consumers:
  ops-agent:
    role: execution
    description: Moves accepted files to correct project locations
    reads: [protocol.md, placement_rules]

inputs:
  job_id:
    type: string
    required: true
    description: Staging job with accepted artifacts
  artifacts:
    type: array
    required: true
    description: List of accepted artifact paths

outputs:
  moved_files:
    type: array
    description: List of source → destination mappings

triggers:
  - post-audit: "After audit passes and files are accepted"
  - explicit: "User says 'organize staging', 'move accepted files'"

placement_rules:
  - "Python files → appropriate repo src/ directory"
  - "Test files → tests/ directory of the relevant repo"
  - "Config files → config/ or root of relevant repo"
  - "Documentation → docs/ or relevant location"
  - "Scripts → scripts/ directory"
  - "When unsure, ask the user for destination"

quality_gates:
  - "All accepted files moved to destinations"
  - "No files left orphaned in staging"
  - "Destination directories exist before move"
  - "No overwriting existing files without confirmation"
