name: staging-cleanup
version: "1.0"
description: >
  Protocol for cleaning up old staging directories. Removes completed
  or expired staging jobs to prevent disk space accumulation.

entry_point: protocol.md
type: instruction-protocol

permissions:
  - staging:write
  - staging:read

consumers:
  ops-agent:
    role: execution
    description: Cleans up old staging directories
    reads: [protocol.md, retention_rules]

inputs:
  max_age_hours:
    type: integer
    default: 24
    description: Delete staging jobs older than this
  dry_run:
    type: boolean
    default: false
    description: List what would be deleted without deleting

outputs:
  deleted_jobs:
    type: array
    description: List of job IDs that were cleaned up
  freed_bytes:
    type: integer
    description: Total bytes freed

triggers:
  - scheduled: "Periodic cleanup (daily or on demand)"
  - explicit: "User says 'clean staging', 'cleanup old jobs'"

retention_rules:
  - "Keep jobs less than 24 hours old by default"
  - "Keep jobs with unresolved rejections (for debugging)"
  - "Always delete empty staging directories"
  - "Log what was deleted for audit trail"

quality_gates:
  - "No active jobs deleted"
  - "Deletion logged before execution"
  - "Disk space reported before and after"
