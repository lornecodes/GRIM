schema_version: '2.0'
directory_name: skills
description: >
  34 skill protocol definitions. Each skill subdirectory contains manifest.yaml
  (metadata, triggers, tool groups) and protocol.md (step-by-step execution guide).
  Categories: vault operations (kronos-capture/promote/recall/relate/reflect/bp/journal/note),
  task management (task-manage, sprint-plan, calendar-manage), code operations
  (code-execution, git-operations, file-operations, shell-execution), project lifecycle
  (deep-ingest, vault-sync, experiment-validate/scaffold, fdo-source-validate),
  routing (capability-routing, model-routing, source-navigate), and CI/CD
  (eval-gate, ship-it, docker-release).
semantic_scope:
  - skills
  - protocols
  - manifests
  - vault-operations
  - task-management
  - code-operations
  - ci-cd
