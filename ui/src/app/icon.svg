  <!-- Ghost tail (fading) -->
  <rect x="8"  y="24" width="2" height="2" fill="#2a4058" opacity="0.7"/>
  <rect x="10" y="24" width="2" height="2" fill="#1a2b3c" opacity="0.7"/>
  <rect x="20" y="24" width="2" height="2" fill="#1a2b3c" opacity="0.7"/>
  <rect x="22" y="24" width="2" height="2" fill="#2a4058" opacity="0.7"/>

  <rect x="8"  y="26" width="2" height="2" fill="#2a4058" opacity="0.4"/>
  <rect x="22" y="26" width="2" height="2" fill="#2a4058" opacity="0.4"/>

  <rect x="8"  y="28" width="2" height="2" fill="#1a2b3c" opacity="0.2"/>
</svg>
