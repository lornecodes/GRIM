schema_version: '2.0'
directory_name: GRIM
description: >
  GRIM — AI companion and autonomous productivity system for the Dawn Field Institute.
  Built on the Claude Agent SDK with persistent sessions (GrimClient), a pool-based
  execution architecture (Project Charizard), and Kronos MCP for knowledge graph access.
  Features 34 skills, 36 MCP tools, 2300+ tests, and a Next.js Mission Control UI.
  Personality-driven with the Shade archetype. Supports Discord, web, and CLI frontends.
