  # Kronos vault skills — using actual trigger phrases
  # ══════════════════════════════════════════════════════════
  - id: skill-kronos-capture
    tags: [skill, kronos-capture]
    message: "capture this concept about entropy bounds"
    expected:
      matched_skills: [kronos-capture]
      delegation_hint: memory

  - id: skill-kronos-promote
    tags: [skill, kronos-promote]
