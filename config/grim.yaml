# GRIM Engine Configuration
# Overrides IronClaw defaults for GRIM personal assistant
#
# This file is loaded by the `ironclaw grim` command.
# It contains both GRIM-specific extensions (vault_path, identity,
# mcp_servers) and standard IronClaw engine config (agent, permissions, etc.).

# ── GRIM Extensions ─────────────────────────────────────────────────────

# Path to external Kronos vault (not inside this repo)
vault_path: "../kronos-vault"

# Identity layer configuration
identity:
  system_prompt_path: "identity/system_prompt.md"
  personality_path: "identity/personality.yaml"
  skills_path: "skills/"

# MCP servers GRIM connects to
mcp_servers:
  kronos:
    command: "python"
    args: ["-m", "kronos_mcp"]
    env:
      KRONOS_VAULT_PATH: "../kronos-vault"
    enabled: true
    startup_timeout_secs: 15

  obsidian:
    command: "uvx"
    args: ["mcp-obsidian"]
    env:
      OBSIDIAN_API_KEY: "${OBSIDIAN_API_KEY}"
      OBSIDIAN_HOST: "127.0.0.1"
      OBSIDIAN_PORT: "27124"
    enabled: false    # enable when Obsidian Local REST API is running
    startup_timeout_secs: 10

# ── IronClaw Engine Config ──────────────────────────────────────────────

agent:
  system_prompt: "overridden by identity layer"
  default_provider: "anthropic"
  default_model: "claude-sonnet-4-6"
  max_turns: 100
  tool_timeout_secs: 60
  max_daily_cost_cents: 1000

permissions:
  filesystem:
    read:
      - "../kronos-vault/**"
      - "./skills/**"
      - "./config/**"
      - "./identity/**"
    write:
      - "../kronos-vault/**"
      - "./output/**"
      - "./tmp/**"
    deny:
      - "**/.env"
      - "**/.env.*"
      - "**/*.pem"
      - "**/*.key"
      - "**/secrets/**"
      # Linux paths (required by IronClaw validator)
      - "/etc/shadow"
      - "/etc/gshadow"
      - "/root/.ssh"
      - "**/.ssh/id_*"
      - "**/.aws/credentials"
      - "**/.gnupg/private-keys"

  network:
    allow_domains:
      - "api.anthropic.com"
      - "api.github.com"
      - "*.github.com"
    block_domains:
      - "metadata.google.internal"
      - "169.254.169.254"
      - "metadata.azure.com"
    block_private: false          # needed for local MCP connections
    max_requests_per_hour: 500

  system:
    allow_shell: false            # enable later with Claude Code skill
    require_approval: true
    max_concurrent: 4

sandbox:
  backend: "native"              # use native sandbox on Windows (no Docker required)
  enforce: false                  # relax for development, enforce in production
  network_policy: "allow_local"

memory:
  backend: "encrypted_sqlite"
  path: "~/.grim/memory.db"
  encrypt_at_rest: true

providers:
  anthropic:
    provider_type: "anthropic"
    model: "claude-sonnet-4-6"
    max_tokens: 8192
    temperature: 0.7

# Model routing — multi-tier model selection (haiku/sonnet/opus)
routing:
  enabled: true
  default_tier: "sonnet"
  classifier_enabled: false   # enable after calibration
  confidence_threshold: 0.6

# Context window management — compress old messages when approaching limit
context_management:
  max_tokens: 160000        # trigger compression above this (~200K model limit)
  keep_recent: 12           # keep last N messages (6 turns) intact

# Persistent objectives — survive compression and session boundaries
objectives:
  max_active: 10

skills:
  directory: "./skills"
  require_signatures: false       # disable for development

channels: {}

audit:
  path: "~/.grim/audit.log"
  enabled: true

dlp:
  enabled: false                  # enable for production

antitheft:
  enforce: false                  # enable for production

# Execution Pool (Project Charizard) — async job execution via Agent SDK
pool:
  enabled: true                   # Phase 1 complete — pool active
  num_slots: 4                    # concurrent agent slots
  poll_interval: 2.0              # seconds between queue polls
  db_path: "local/pool.db"       # SQLite queue persistence
  max_turns_per_job: 20           # safety valve on agent turns
  job_timeout_secs: 900           # 15 min max per job

# Management Daemon (Project Mewtwo) — autonomous story dispatch
daemon:
  enabled: true
  poll_interval: 30.0             # seconds between scan cycles
  max_concurrent_jobs: 4          # max stories dispatched at once
