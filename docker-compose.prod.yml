# GRIM Production Override
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Layered on top of docker-compose.yml for dedicated server deployment.
# Tuned for 16GB server at 10.0.0.62.

services:
  cliproxyapi:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  ai-bridge:
    restart: always
    ports: []   # No dashboard exposure in prod
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  redis:
    restart: always
    ports: []   # Internal only in prod
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  grim:
    environment:
      - GRIM_ENV=production
      - GRIM_WORKSPACE_ROOT=/workspace
      # Vault inside workspace so MCP source tools resolve repos via Path(vault).parent
      - KRONOS_VAULT_PATH=/workspace/kronos-vault
      - GRIM_VAULT_PATH=/workspace/kronos-vault
    restart: always
    ports:
      - "8080:8080"   # LAN accessible (all interfaces)
    volumes:
      - ${WORKSPACE_PATH:-/home/peter/repos/core_workspace}:/workspace
      - ./local:/app/local
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  grim-discord:
    environment:
      - GRIM_ENV=production
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
