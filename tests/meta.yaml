description: >
  Comprehensive pytest test suite — 2300+ tests across 60+ files. Coverage spans all
  GRIM subsystems: core (grim_core, graph_router, keyword_router, intent_classifier),
  agents (registry, integration, comprehensive, base_agent_callable, codebase_agent),
  tools (tool_registry, tool_context, workspace), pool (unit, smoke, workspace, locks,
  snapshot, audit, events, streaming, notifiers, MCP), tasks (unit, smoke, E2E, handlers),
  sessions (session_knowledge, conversation_store, sessions), eval (datasets, runner,
  comparator), Discord (discord_bot, discord_pool, inchat_pool), and infrastructure
  (mcp_e2e, mcp_handlers, redis_cache, reasoning_cache, websocket_v2).
