# GRIM Docker Compose — local development
#
# Usage:
#   docker compose up --build
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d  (production)
#
# Requires:
#   - Parent directory is the core_workspace root (or set WORKSPACE_PATH)
#   - CLIProxyAPI OAuth login (one-time):
#       docker exec -it cliproxyapi /CLIProxyAPI/CLIProxyAPI --claude-login

services:
  # ── Claude Max API Proxy ──────────────────────────────────
  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    pull_policy: always
    container_name: cliproxyapi
    volumes:
      - cliproxyapi-auths:/root/.cli-proxy-api
      - ./config/cliproxyapi.yaml:/CLIProxyAPI/config.yaml:ro
    expose:
      - "8317"
    ports:
      - "127.0.0.1:54545:54545"   # OAuth callback — localhost only, one-time setup
    networks:
      - grim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8317/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── AI Bridge (token tracking proxy) ─────────────────────
  ai-bridge:
    build: bridge/
    container_name: ai-bridge
    depends_on:
      cliproxyapi:
        condition: service_healthy
    environment:
      - UPSTREAM_URL=http://cliproxyapi:8317
      - BRIDGE_DB_PATH=/data/tokens.db
    volumes:
      - bridge-data:/data
    expose:
      - "8318"
    ports:
      - "127.0.0.1:8318:8318"   # Dashboard API — localhost only
    networks:
      - grim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8318/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Redis cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kronos-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"   # Local dev access (MCP subprocess)
    networks:
      - grim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── GRIM ──────────────────────────────────────────────────
  grim:
    build: .
    image: grim:latest
    container_name: grim
    depends_on:
      ai-bridge:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${GRIM_PORT:-8080}:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-placeholder-for-proxy}
      - ANTHROPIC_BASE_URL=http://ai-bridge:8318
      - GRIM_ENV=${GRIM_ENV:-debug}
      - GRIM_WORKSPACE_ROOT=/workspace
      - GRIM_VAULT_PATH=/workspace/kronos-vault
      - KRONOS_VAULT_PATH=/workspace/kronos-vault
      - KRONOS_SKILLS_PATH=/app/skills
      - KRONOS_REDIS_URL=redis://redis:6379/0
      - GRIM_REDIS_URL=redis://redis:6379/0
      - POOL_JOB_TIMEOUT_SECS=${POOL_JOB_TIMEOUT_SECS:-900}
      - POOL_DISCORD_WEBHOOK_URL=${POOL_DISCORD_WEBHOOK_URL:-}
    command: ["uvicorn", "server.app:app", "--host", "0.0.0.0", "--port", "8080", "--log-level", "info"]
    volumes:
      - ${WORKSPACE_PATH:-..}:/workspace
      - ./local:/app/local
    networks:
      - grim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── GRIM Discord Bot ─────────────────────────────────────
  grim-discord:
    build:
      context: .
      dockerfile: Dockerfile.discord
    image: grim-discord:latest
    container_name: grim-discord
    depends_on:
      grim:
        condition: service_healthy
      ai-bridge:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-placeholder-for-proxy}
      - ANTHROPIC_BASE_URL=http://ai-bridge:8318
      - GRIM_DISCORD_TOKEN=${GRIM_DISCORD_TOKEN}
      - GRIM_DISCORD_OWNER_ID=${GRIM_DISCORD_OWNER_ID:-}
      - GRIM_DISCORD_GUILDS=${GRIM_DISCORD_GUILDS:-}
      - GRIM_DISCORD_CHANNELS=${GRIM_DISCORD_CHANNELS:-}
      - GRIM_DAEMON_CHANNEL_ID=${GRIM_DAEMON_CHANNEL_ID:-}
      - GRIM_ENV=${GRIM_ENV:-production}
      - GRIM_SERVER_URL=http://grim:8080
      - GRIM_VAULT_PATH=/workspace/kronos-vault
      - KRONOS_VAULT_PATH=/workspace/kronos-vault
      - KRONOS_SKILLS_PATH=/app/skills
      - KRONOS_REDIS_URL=redis://redis:6379/0
    volumes:
      - ${WORKSPACE_PATH:-..}:/workspace
      - grim-discord-sessions:/app/local
    networks:
      - grim-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  grim-net:
    name: grim-net
    driver: bridge

volumes:
  cliproxyapi-auths:
    name: cliproxyapi-auths
  bridge-data:
    name: bridge-data
  grim-discord-sessions:
    name: grim-discord-sessions
